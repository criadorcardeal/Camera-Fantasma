<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0e2a3b" />
  <title>Fotos Fantasma</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fotos Fantasma" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <!-- ============ TELA: INÍCIO ============ -->
  <section id="screen-home" class="screen active">
    <header class="topbar">
      <h1>Fotos Fantasma</h1>
    </header>
    <div class="content" id="home-list"></div>
    <button id="btn-new" class="fab">+ Nova foto base</button>
  </section>

  <!-- ============ TELA: CÂMERA ============ -->
  <section id="screen-camera" class="screen camera">
    <video id="video" playsinline autoplay muted></video>
    <img id="ghost" class="ghost" alt="" />
    <canvas id="canvas" hidden></canvas>

    <div class="cam-top">
      <button id="cam-close" class="icon-btn">✕</button>
      <span id="cam-title">Foto base</span>
      <button id="cam-torch" class="icon-btn" title="Lanterna">🔦</button>
    </div>

    <div class="cam-side">
      <label class="slider-wrap" id="ghost-wrap">
        <span>Fantasma</span>
        <input type="range" id="ghost-opacity" min="0" max="1" step="0.01" value="0.5" />
      </label>
      <label class="slider-wrap">
        <span>Brilho</span>
        <input type="range" id="f-brightness" min="0.5" max="1.5" step="0.01" value="1" />
      </label>
      <label class="slider-wrap">
        <span>Contraste</span>
        <input type="range" id="f-contrast" min="0.5" max="1.5" step="0.01" value="1" />
      </label>
      <label class="slider-wrap">
        <span>Saturação</span>
        <input type="range" id="f-saturate" min="0" max="2" step="0.01" value="1" />
      </label>
    </div>

    <div class="cam-bottom">
      <div id="distance-chip" class="chip">Mantenha 40–60 cm do local</div>
      <button id="cam-shoot" class="shutter" aria-label="Capturar"><span class="shutter-ic">📷</span></button>
    </div>
    <div id="cam-start" class="cam-start" hidden>
      <button>▶ Toque para iniciar a câmera</button>
    </div>
    <div id="cam-error" class="cam-error" hidden></div>
  </section>

  <!-- ============ TELA: DETALHE ============ -->
  <section id="screen-detail" class="screen">
    <header class="topbar">
      <button id="detail-back" class="icon-btn dark">‹</button>
      <h1>Comparação</h1>
      <button id="detail-delete" class="icon-btn dark">🗑</button>
    </header>
    <div class="content" id="detail-content"></div>
  </section>

  <!-- ============ DIÁLOGO: DISTÂNCIA ============ -->
  <dialog id="dist-dialog">
    <form method="dialog">
      <h3>Distância da foto</h3>
      <p id="dist-target" hidden></p>
      <label>Distância (cm)
        <input type="number" id="dist-input" inputmode="numeric" value="50" min="1" />
      </label>
      <small>Recomendado: 40 a 60 cm</small>
      <menu>
        <button value="cancel" id="dist-cancel">Refazer</button>
        <button value="ok" id="dist-ok" class="primary">Salvar</button>
      </menu>
    </form>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
