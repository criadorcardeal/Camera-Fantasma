name: Build APK

# Gera o APK de teste do app "Fotos Fantasma" na nuvem.
# Roda automaticamente em cada push e tambem pode ser disparado manualmente
# (aba Actions -> Build APK -> Run workflow).

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Gerar pastas das plataformas (android)
        # O projeto versiona apenas lib/ e pubspec.yaml. Aqui recriamos a
        # pasta android/ a partir do template do Flutter e injetamos o nosso
        # AndroidManifest.xml (com a permissao de camera).
        run: |
          flutter create --org com.ricardolacerda --project-name fotos_fantasma --platforms=android scaffold_tmp
          rm -rf android
          cp -r scaffold_tmp/android ./android
          rm -rf scaffold_tmp
          cp ci/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK (release)
        run: flutter build apk --release

      - name: Publicar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: fotos-fantasma-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
